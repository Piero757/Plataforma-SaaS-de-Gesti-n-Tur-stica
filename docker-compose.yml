version: '3.9'

services:
  # ==================
  # BASE DE DATOS
  # ==================
  postgres:
    image: postgres:16-alpine
    container_name: saas_turismo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-saas_turismo}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas_secure_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d saas_turismo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  # ==================
  # CACHE / SESSIONS
  # ==================
  redis:
    image: redis:7-alpine
    container_name: saas_turismo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secure_pass_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - saas_network

  # ==================
  # BACKEND API
  # ==================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_turismo_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-saas_secure_pass_2024}@postgres:5432/${DB_NAME:-saas_turismo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - backend_node_modules:/app/node_modules
    networks:
      - saas_network

  # ==================
  # FRONTEND
  # ==================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_turismo_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_NAME: "Plataforma SaaS de Gestión Turística"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - frontend_node_modules:/app/node_modules
    networks:
      - saas_network

  # ==================
  # NGINX (Proxy)
  # ==================
  nginx:
    image: nginx:alpine
    container_name: saas_turismo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    networks:
      - saas_network

# ==================
# VOLUMES
# ==================
volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
  nginx_certs:

# ==================
# NETWORKS
# ==================
networks:
  saas_network:
    driver: bridge
