<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | TurismoERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f8fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
            color: #009ef7;
        }
        .btn-primary {
            background-color: #009ef7;
            border: none;
            padding: 0.8rem;
            font-weight: 600;
        }
        .form-control {
            padding: 0.8rem;
            border-color: #ebedf3;
        }
        .form-control:focus {
            border-color: #009ef7;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <i data-lucide="palmtree" style="width: 48px; height: 48px;"></i>
            <h2 class="fw-bold mt-2 text-dark">TurismoERP</h2>
            <p class="text-muted small">Bienvenido, por favor inicie sesión</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger small py-2">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="nombre de usuario" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid shadow-sm">
                <button type="submit" class="btn btn-primary">Entrar al Sistema</button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted xsmall mb-0">Protegido por TurismoERP Security</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
